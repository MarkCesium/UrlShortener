name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: cp .env.template .env
      - run: uv sync

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src tests

      - name: Tests
        run: uv run pytest tests/ -v

  generator:
    name: Generator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/generator

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: cp .env.template .env
      - run: uv sync

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src tests

      - name: Tests
        run: uv run pytest tests/ -v
