services:
  database:
    ports:
      - "${DATABASE_PORT}:5432"

  nats:
    ports:
      - "${NATS_PORT}:4222"

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/backend/src:/backend/src
      - ./var/backend:/backend/var/app

  redis:
    ports:
      - "${REDIS_PORT}:6379"

  generator:
    build:
      context: ./services/generator
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/generator/src:/generator/src
      - ./var/generator:/generator/var/app
