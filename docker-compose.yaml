services:
  nats:
    image: nats:latest
    container_name: urlshortener-nats
    networks:
      - urlshortener
    volumes:
      - ./var/nats:/data
    command: >
      --jetstream
      --store_dir=/data

  backend:
    container_name: urlshortener-backend
    networks:
      - urlshortener
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  generator:
    container_name: urlshortener-generator
    depends_on:
      nats:
        condition: service_started
    networks:
      - urlshortener
    build:
      context: ./services/generator
      dockerfile: Dockerfile

networks:
  urlshortener:
    name: urlshortener-network
    driver: bridge
